<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carte de Visite — Karim Benali</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #0f1117;
      --paper:  #f7f4ef;
      --gold:   #b8935a;
      --muted:  #8a8680;
      --card-w: 420px;
    }

    body {
      min-height: 100vh;
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      padding: 2rem;
    }

    .card {
      background: var(--paper);
      width: var(--card-w);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,.55);
    }

    /* ── Header band ── */
    .card__header {
      background: var(--ink);
      padding: 2.5rem 2.2rem 2rem;
      position: relative;
    }

    .card__header::after {
      content: '';
      display: block;
      width: 48px;
      height: 3px;
      background: var(--gold);
      margin-top: 1.2rem;
    }

    .card__name {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: #fff;
      line-height: 1.15;
      letter-spacing: -.01em;
    }

    .card__title {
      margin-top: .45rem;
      font-size: .85rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    /* ── Body ── */
    .card__body {
      padding: 2rem 2.2rem 2.4rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .item__icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      border: 1.5px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: .05rem;
    }

    .item__icon svg {
      width: 16px;
      height: 16px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .item__label {
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .18rem;
    }

    .item__value {
      font-size: .96rem;
      font-weight: 400;
      color: var(--ink);
    }

    .item__value a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .2s, color .2s;
    }
    .item__value a:hover {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    /* ── Footer ── */
    .card__footer {
      border-top: 1px solid #e4e0d9;
      padding: .9rem 2.2rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .card__footer span {
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .06em;
    }

    .dot {
      width: 5px;
      height: 5px;
      background: var(--gold);
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="card__header">
      <div class="card__name">Karim Benali</div>
      <div class="card__title">Architecte & Designer Numérique</div>
    </div>

    <div class="card__body">

      <!-- Téléphone -->
      <div class="item">
        <div class="item__icon">
          <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
        </div>
        <div>
          <div class="item__label">Téléphone</div>
          <div class="item__value"><a href="tel:+213555123456">+213 555 123 456</a></div>
        </div>
      </div>

      <!-- Email -->
      <div class="item">
        <div class="item__icon">
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div>
          <div class="item__label">Email</div>
          <div class="item__value"><a href="mailto:karim@benali-studio.dz">karim@benali-studio.dz</a></div>
        </div>
      </div>

      <!-- Site web -->
      <div class="item">
        <div class="item__icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
        </div>
        <div>
          <div class="item__label">Site Web</div>
          <div class="item__value"><a href="https://www.benali-studio.dz" target="_blank">www.benali-studio.dz</a></div>
        </div>
      </div>

      <!-- Adresse -->
      <div class="item">
        <div class="item__icon">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div>
          <div class="item__label">Adresse</div>
          <div class="item__value">12 Rue Didouche Mourad<br>Alger, Algérie</div>
        </div>
      </div>

    </div>

    <div class="card__footer">
      <div class="dot"></div>
      <span>Benali Studio · Alger · 2026</span>
    </div>

  </div>
</body>
</html>
